services:
  db:
    image: postgres:16-alpine
    container_name: comushop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: comushop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - comushop_pgdata:/var/lib/postgresql/data

volumes:
  comushop_pgdata:
